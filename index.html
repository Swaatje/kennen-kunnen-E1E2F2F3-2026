<style>
:root {
  --e1:#4f9cf9; --e2:#a78bfa; --f2:#34d399;
  --tr:0.2s ease;
}
[data-theme="light"] {
  --bg:#f1f5f9; --surf:#fff; --surf2:#e8eef5;
  --bd:#d1dae8; --txt:#1a202c; --txt2:#374151; --txt3:#6b7280;
  --hbg:#f1f5f9f0; --reven:#fff; --rodd:#f8fafc;
  --make-bg:rgba(22,163,74,.09); --make-fg:#15803d; --make-bd:rgba(22,163,74,.25);
  --skip-bg:rgba(220,38,38,.07); --skip-fg:#b91c1c; --skip-bd:rgba(220,38,38,.2);
  --ken-bg:rgba(180,120,0,.09);  --ken-fg:#92400e;  --ken-bd:rgba(180,120,0,.25);
  --kun-bg:rgba(37,99,235,.08);  --kun-fg:#1d4ed8;  --kun-bd:rgba(37,99,235,.2);
  --kk-row:#fff8e6;
  --knob:#f59e0b; --track:#dbeafe;
  --ohbg:#f8fafc; --ohhov:#eef2f7; --thbg:#f1f5f9;
  --kk-btn-bg:rgba(160,100,0,.09); --kk-btn-fg:#7c4a00; --kk-btn-bd:#b07d3a;
}
[data-theme="dark"] {
  --bg:#0f1117; --surf:#181c27; --surf2:#1e2333;
  --bd:#2a3045; --txt:#e2e8f0; --txt2:#94a3b8; --txt3:#64748b;
  --hbg:#0f1117f0; --reven:#0f1117; --rodd:#131722;
  --make-bg:rgba(34,197,94,.10); --make-fg:#4ade80; --make-bd:rgba(34,197,94,.25);
  --skip-bg:rgba(239,68,68,.08); --skip-fg:#f87171; --skip-bd:rgba(239,68,68,.2);
  --ken-bg:rgba(234,179,8,.10);  --ken-fg:#fbbf24;  --ken-bd:rgba(234,179,8,.25);
  --kun-bg:rgba(79,156,249,.10); --kun-fg:#60a5fa;  --kun-bd:rgba(79,156,249,.25);
  --kk-row:#2a2510;
  --knob:#4f9cf9; --track:#1e2333;
  --ohbg:#181c27; --ohhov:#222840; --thbg:#181c27;
  --kk-btn-bg:rgba(234,179,8,.12); --kk-btn-fg:#fbbf24; --kk-btn-bd:rgba(234,179,8,.4);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:60px;transition:background var(--tr),color var(--tr)}

header{background:var(--hbg);border-bottom:1px solid var(--bd);padding:22px 36px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);transition:background var(--tr)}
.hi{max-width:1160px;margin:0 auto}
.ht{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{background:linear-gradient(135deg,var(--e1),var(--e2));width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(79,156,249,.3)}
.ht-txt{flex:1}
.ht-txt h1{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--txt);letter-spacing:-.3px;transition:color var(--tr)}
.ht-txt p{font-size:11px;color:var(--txt3);margin-top:2px}
.ttog{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--bd);border-radius:999px;padding:5px 11px 5px 9px;cursor:pointer;font-size:12px;color:var(--txt3);font-family:'DM Sans',sans-serif;transition:all var(--tr);flex-shrink:0}
.ttog:hover{border-color:var(--e1)}
.ttrack{width:30px;height:16px;background:var(--track);border-radius:999px;border:1px solid var(--bd);position:relative;flex-shrink:0}
.tknob{width:10px;height:10px;background:var(--knob);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform var(--tr)}
[data-theme="light"] .tknob{transform:translateX(14px)}

.ctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:180px;max-width:300px}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.sw input{width:100%;background:var(--surf);border:1px solid var(--bd);border-radius:7px;padding:7px 11px 7px 31px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--e1)}
.sw input::placeholder{color:var(--txt3)}
.fg{display:flex;gap:5px;flex-wrap:wrap}
.sep{width:1px;height:22px;background:var(--bd);margin:0 3px}

.fb{background:var(--surf);border:1px solid var(--bd);border-radius:7px;padding:6px 12px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--txt3);cursor:pointer;transition:all .15s;letter-spacing:.3px;white-space:nowrap}
.fb:hover{border-color:var(--e1);color:var(--txt)}
.fb.a-all{background:rgba(79,156,249,.12);border-color:var(--e1);color:var(--e1)}
.fb.a-e1 {background:rgba(79,156,249,.12);border-color:var(--e1);color:var(--e1)}
.fb.a-e2 {background:rgba(167,139,250,.12);border-color:var(--e2);color:var(--e2)}
.fb.a-f2 {background:rgba(52,211,153,.12);border-color:var(--f2);color:var(--f2)}
.fb.a-kk {background:var(--kk-btn-bg);border-color:var(--kk-btn-bd);color:var(--kk-btn-fg)}

.sbar{max-width:1160px;margin:12px auto 0;padding:0 36px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{font-size:11px;color:var(--txt3);background:var(--surf);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;font-family:'Space Mono',monospace}

.bs{max-width:1160px;margin:28px auto 0;padding:0 36px}
.bh{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.btag{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;border-radius:5px;padding:3px 8px;color:#fff;letter-spacing:.5px;flex-shrink:0}
.t1{background:var(--e1)}.t2{background:var(--e2)}.t3{background:var(--f2)}
.bs h2{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--txt)}
.bnm{font-size:13px;color:var(--txt2);flex:1}
.bwk{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3);background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:2px 8px}

.og{margin-bottom:4px}
.oh{display:flex;align-items:center;gap:9px;background:var(--ohbg);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;cursor:pointer;transition:background .15s,border-color .15s;user-select:none}
.oh:hover{background:var(--ohhov);border-color:rgba(79,156,249,.4)}
.odot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.otit{font-size:13px;font-weight:500;flex:1;color:var(--txt)}
.ocnt{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3)}
.chv{color:var(--txt3);transition:transform .2s;flex-shrink:0}
.oh:not(.closed) .chv{transform:rotate(180deg)}

.tw{overflow-x:auto;border:1px solid var(--bd);border-top:none;border-radius:0 0 8px 8px;background:var(--surf)}
table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed}
col.c-par  {width:60px}
col.c-maken{width:28%}
col.c-niet {width:18%}
col.c-ken  {width:27%}
col.c-kun  {width:27%}
thead tr{background:var(--thbg)}
th{padding:8px 12px;text-align:left;font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;color:var(--txt3);letter-spacing:.3px;border-bottom:1px solid var(--bd);white-space:nowrap;overflow:hidden}
tbody tr:nth-child(even){background:var(--rodd)}
tbody tr:nth-child(odd){background:var(--reven)}
td{padding:7px 12px;vertical-align:top;border-bottom:1px solid var(--bd);color:var(--txt2);overflow-wrap:break-word}
td:first-child{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}

.b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11.5px;font-weight:500;border:1px solid}
.bm {background:var(--make-bg);color:var(--make-fg);border-color:var(--make-bd)}
.bs2{background:var(--skip-bg);color:var(--skip-fg);border-color:var(--skip-bd)}
.bk {background:var(--ken-bg);color:var(--ken-fg);border-color:var(--ken-bd)}
.bu {background:var(--kun-bg);color:var(--kun-fg);border-color:var(--kun-bd)}
.dash{color:var(--txt3);font-size:12px}

.kk-on td:nth-child(2),.kk-on td:nth-child(3){opacity:.28}
tr.kk-row{background:var(--kk-row)!important}
#banner{background:var(--ken-bg);border:1px solid var(--ken-bd);border-radius:7px;padding:7px 14px 7px 50px;font-size:12px;color:var(--ken-fg);max-width:1160px;margin:10px auto 0;display:none}

.leg{max-width:1160px;margin:16px auto 0;padding:0 36px;display:flex;gap:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3)}

.empty{display:none;text-align:center;padding:60px 20px;color:var(--txt3)}
.empty svg{margin:0 auto 10px;display:block}

@media(max-width:700px){
  header{padding:14px 16px 12px}
  .bs{padding:0 12px}
  .sbar{padding:0 12px}
  .leg{padding:0 12px}
  th:nth-child(3),td:nth-child(3){display:none}
}
</style>
</head>

(function build(){

    const info = BLOKKEN[bk];
    const sec  = document.createElement('div');
    sec.className = 'bs';
    sec.id = 'sec-'+bk;
    const tagNr = bk==='e1'?'1':bk==='e2'?'2':'3';
    sec.innerHTML = `<div class="bh">
      <span class="btag t${tagNr}">${info.label}</span>
      <h2>${info.label}</h2>
      <span class="bnm">${info.naam}</span>
      <span class="bwk">${info.week}</span>
    </div>`;

    secs[bk].forEach((g,gi)=>{
      const gid = `g-${bk}-${gi}`;
      const div = document.createElement('div');
      div.className = 'og';
      div.id = gid+'-wrap';

      const rijen = g.rijen.map(r=>{
        const hk = (r.ken && r.ken!=='Geen') ? '1':'0';
        const hu = (r.kun && r.kun!=='Geen') ? '1':'0';
        const srch = [r.par,g.naam,r.maken,r.niet,r.ken,r.kun].join(' ').toLowerCase();
        return `<tr data-s="${srch}" data-hk="${hk}" data-hu="${hu}">
          <td>${r.par}</td>
          <td>${bdg(r.maken,'bm')||'<span class="dash">—</span>'}</td>
          <td>${bdg(r.niet,'bs2')}</td>
          <td>${bdg(r.ken,'bk')}</td>
          <td>${bdg(r.kun,'bu')}</td>
        </tr>`;
      }).join('');

      div.innerHTML = `
        <div class="oh closed" id="${gid}-hdr" onclick="tog('${gid}')">
          <div class="odot" style="background:${DOTS[bk]}"></div>
          <span class="otit">${g.naam}</span>
          <span class="ocnt">${g.rijen.length} par.</span>
          <svg class="chv" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="tw" id="${gid}-tbl" style="display:none">
          <table id="${gid}-table">
            <colgroup>
              <col class="c-par"><col class="c-maken"><col class="c-niet"><col class="c-ken"><col class="c-kun">
            </colgroup>
            <thead><tr>
              <th>Par.</th><th>Maken</th><th>Niet maken</th><th>Kennen (= leren)</th><th>Kunnen (= toepassen)</th>
            </tr></thead>
            <tbody>${rijen}</tbody>
          </table>
        </div>`;
      sec.appendChild(div);
    });
    mc.appendChild(sec);
  });
})();

function tog(gid){
  const tbl = document.getElementById(gid+'-tbl');
  const hdr = document.getElementById(gid+'-hdr');
  const open = tbl.style.display !== 'none';
  tbl.style.display = open ? 'none' : '';
  hdr.classList.toggle('closed', open);
}

let actBlok = 'all';
let actKK   = false;
let actZoek = '';

function filter(){
  const q = actZoek.trim().toLowerCase();
  let tot = 0;

  document.querySelectorAll('.bs').forEach(sec=>{
    const bk = sec.id.replace('sec-','');
    if(actBlok !== 'all' && actBlok !== bk){
      sec.style.display = 'none';
      return;
    }
    sec.style.display = '';

    sec.querySelectorAll('.og').forEach(og=>{
      const gid  = og.id.replace('-wrap','');
      const tbl  = document.getElementById(gid+'-tbl');
      const hdr  = document.getElementById(gid+'-hdr');
      const tabl = document.getElementById(gid+'-table');
      const gnm  = og.querySelector('.otit').textContent.toLowerCase();

      tabl.classList.toggle('kk-on', actKK);

      let zichtbaar = 0;
      tabl.querySelectorAll('tbody tr').forEach(tr=>{
        const kkOk   = !actKK || tr.dataset.hk==='1' || tr.dataset.hu==='1';
        const zoekOk = !q     || tr.dataset.s.includes(q) || gnm.includes(q);
        const toon   = kkOk && zoekOk;
        tr.style.display = toon ? '' : 'none';
        tr.classList.toggle('kk-row', toon && actKK);
        if(toon){ zichtbaar++; tot++; }
      });

      if(zichtbaar === 0){
        og.style.display = 'none';
      } else {
        og.style.display = '';
        if(actKK || actZoek.trim()){
          tbl.style.display = '';
          hdr.classList.remove('closed');
        }
      }
    });
  });

  document.getElementById('cnt').textContent = tot;
  document.getElementById('empty').style.display = tot===0 ? 'block':'none';
  document.getElementById('banner').style.display = actKK ? '':'none';
}

document.querySelectorAll('[data-blok]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-blok]').forEach(b=>b.className='fb');
    actBlok = btn.dataset.blok;
    btn.classList.add(actBlok==='all'?'a-all':'a-'+actBlok);
    if(actBlok==='all'){
      document.querySelectorAll('.og').forEach(og=>{
        const gid = og.id.replace('-wrap','');
        const tbl = document.getElementById(gid+'-tbl');
        const hdr = document.getElementById(gid+'-hdr');
        if(tbl){ tbl.style.display='none'; }
        if(hdr){ hdr.classList.add('closed'); }
      });
    }
    filter();
  });
});

document.getElementById('btnKK').addEventListener('click',()=>{
  actKK = !actKK;
  document.getElementById('btnKK').classList.toggle('a-kk', actKK);
  filter();
});
function resetKK(){
  actKK = false;
  document.getElementById('btnKK').classList.remove('a-kk');
  filter();
}

document.getElementById('zoek').addEventListener('input',e=>{
  actZoek = e.target.value;
  filter();
});

const ROOT = document.documentElement;
const TICON = document.getElementById('ticon');
const TLBL  = document.getElementById('tlbl');
function setTheme(t){
  ROOT.setAttribute('data-theme',t);
  localStorage.setItem('inf-theme',t);
  TICON.textContent = t==='dark'?'☀️':'🌙';
  TLBL.textContent  = t==='dark'?'Light':'Dark';
}
setTheme(localStorage.getItem('inf-theme')||'light');
document.getElementById('togTheme').addEventListener('click',()=>{
  setTheme(ROOT.getAttribute('data-theme')==='dark'?'light':'dark');
});

filter();
</script>
</body>
</html>
